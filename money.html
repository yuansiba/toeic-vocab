<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>小攤位收銀 Pro - 高按鈕版</title>
    <style>
        :root {
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* 停用 iOS 長按彈出視窗 */
            user-select: none;
            touch-action: manipulation; 
        }
        
        body {
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0;
            background-color: #1a1a1a; color: white; 
            height: 100svh; width: 100vw; overflow: hidden;
        }

        /* 核心按鈕防縮放設置 */
        button {
            touch-action: none; /* 徹底停用所有瀏覽器手勢，防止放大 */
            -webkit-tap-highlight-color: transparent;
        }

        .main-layout {
            display: none;
            grid-template-columns: 0.8fr 1.1fr 1.6fr;
            gap: 8px; height: 100%;
            padding: 8px var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        
        #report-panel { display: none; flex-direction: column; padding: 20px; height: 100%; overflow-y: auto; background: #000; }
        .panel { background: #2d2d2d; padding: 10px; border-radius: 16px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        
        /* 重新分配中間面板：明細縮小，數量鍵拉高 */
        .panel-middle { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        /* 商品明細：極度緊湊版，剛好裝三個 */
        .order-list { 
            background: #000; border-radius: 10px; padding: 2px; 
            overflow: hidden; border: 1px solid #444; 
            height: 105px; /* 高度縮減，留空間給下方 */
            flex-shrink: 0;
        }
        .order-item { 
            display: flex; justify-content: space-between; 
            height: 34px; align-items: center; padding: 0 10px;
            border-bottom: 1px solid #333; color: #f1c40f; 
            font-size: 0.85rem; /* 字體縮小 */
        }

        /* 數量按鈕：佔滿剩餘空間，變得更高 */
        .qty-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(3, 1fr); grid-auto-flow: column; 
            gap: 6px; 
            flex-grow: 1; /* 自動長高 */
        }
        .btn-qty { font-size: 1.6rem; background: #6c5ce7; border: none; border-radius: 12px; color: white; font-weight: bold; }

        /* 商品與收銀按鈕維持樣式 */
        .btn-item { flex: 1; font-size: 1.2rem; border: 3px solid transparent; border-radius: 12px; color: white; font-weight: bold; position: relative; }
        #btn-雞蛋糕大, #btn-雞蛋糕小 { background: #a67c52; }
        #btn-玉米 { background: #f1c40f; color: #2d3436; }
        .selected { border-color: #fff !important; box-shadow: 0 0 12px rgba(255,255,255,0.6); }

        .btn-item.sold-out::after {
            content: "完售"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 1.8rem; color: #e74c3c; border: 4px solid #e74c3c;
            padding: 4px 12px; border-radius: 8px; font-weight: 900; z-index: 10;
        }
        .btn-item.sold-out::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 12px; z-index: 5; }

        .display-box { background: #000; padding: 5px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: flex-end; border: 1px solid #444; min-height: 60px; }
        #total-txt { font-size: 1.2rem; color: #2ecc71; margin: 0; font-weight: bold; }
        #change-txt { font-size: 3.5rem; font-weight: 900; color: #f1c40f; margin: 0; line-height: 0.9; }
        
        .cash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; flex: 4; }
        .btn-cash { font-size: 2.1rem; background: #27ae60; border: none; border-radius: 15px; color: white; font-weight: bold; }
        .btn-clear { background: #4b4b4b; color: #bbb; font-size: 1.3rem; }
        .btn-reset { height: 95px; background: #e74c3c; font-size: 2.5rem; border: none; border-radius: 18px; color: white; font-weight: bold; box-shadow: 0 5px 0 #b03a2e; }

        #corn-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .corn-menu-content { background: #333; padding: 25px; border-radius: 24px; border: 2px solid #f1c40f; display: flex; flex-direction: column; gap: 12px; width: 300px; }
        .btn-corn-opt { padding: 18px; font-size: 1.4rem; border-radius: 12px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="corn-menu" onclick="closeCornMenu()">
    <div class="corn-menu-content" onclick="event.stopPropagation()">
        <h3 style="margin:0 0 10px 0; text-align:center; color:#f1c40f;">玉米快速加點</h3>
        <button class="btn-corn-opt" style="background:#f1c40f;" onclick="quickCorn(1)">+ 1 隻 ($40)</button>
        <button class="btn-corn-opt" style="background:#f39c12;" onclick="quickCorn(2)">+ 2 隻 ($75)</button>
        <button class="btn-corn-opt" style="background:#e67e22;" onclick="quickCorn(3)">+ 3 隻 ($110)</button>
        <button class="btn-corn-opt" style="background:#555; color:white; font-size:1rem; margin-top:10px;" onclick="closeCornMenu()">關閉選單</button>
    </div>
</div>

<div id="cash-layout" class="main-layout">
    <div class="panel">
        <button class="btn-item" id="btn-雞蛋糕大" onpointerdown="startSoldOutLongPress(event, '雞蛋糕大')" onpointerup="endLongPress()" onpointerleave="endLongPress()" onclick="selProd('雞蛋糕大', 100, this)">大 $100</button>
        <button class="btn-item" id="btn-雞蛋糕小" onpointerdown="startSoldOutLongPress(event, '雞蛋糕小')" onpointerup="endLongPress()" onpointerleave="endLongPress()" onclick="selProd('雞蛋糕小', 50, this)">小 $50</button>
        <button class="btn-item" id="btn-玉米" onpointerdown="startCornLongPress(event)" onpointerup="endLongPress()" onpointerleave="endLongPress()" onclick="selProd('玉米', 40, this)">玉米 $40</button>
    </div>

    <div class="panel panel-middle">
        <div id="order-list" class="order-list"></div>
        <div class="qty-grid">
            <button class="btn-qty" onclick="addOrder(1)">+1</button>
            <button class="btn-qty" onclick="addOrder(2)">+2</button>
            <button class="btn-qty" onclick="addOrder(3)">+3</button>
            <button class="btn-qty" onclick="addOrder(4)">+4</button>
            <button class="btn-qty" onclick="addOrder(5)">+5</button>
            <button class="btn-qty" onclick="addOrder(6)">+6</button>
        </div>
    </div>

    <div class="panel">
        <div class="display-box" id="main-display">
            <div style="display:flex; flex-direction:column; padding-bottom:5px;">
                <p id="total-txt">應收: $0</p>
                <p id="paid-txt" style="font-size:1rem; color:#81ecec; margin:0; font-weight:bold;">實收: $0</p>
            </div>
            <div style="display:flex; align-items:flex-start; gap:4px;">
                <span style="color:#f1c40f; font-weight:bold; margin-top:4px;">找零</span>
                <p id="change-txt">--</p>
            </div>
        </div>
        <div class="cash-grid">
            <button class="btn-cash" onclick="addPaid(1000)">1000</button>
            <button class="btn-cash" onclick="addPaid(50)">50</button>
            <button class="btn-cash" onclick="addPaid(500)">500</button>
            <button class="btn-cash" onclick="addPaid(10)">10</button>
            <button class="btn-cash" onclick="addPaid(100)">100</button>
            <button class="btn-cash btn-clear" onclick="clearPaid()">清實收</button>
        </div>
        <button class="btn-reset" onclick="resetAll()">完成結帳</button>
    </div>
</div>

<div id="report-panel">
    <h2 style="color:#2ecc71">今日營業數據</h2>
    <div id="stat-display" style="background:#2d2d2d; padding:15px; border-radius:12px; margin-bottom:15px; font-size:1.2rem;"></div>
    <div id="log-container"></div>
    <button onclick="clearHistory()" style="background:#c0392b; color:white; border:none; padding:15px; border-radius:12px; margin-top:20px; width:100%">清空當日數據</button>
</div>

<script>
    // --- 停用所有手機縮放與長按放大鏡功能 ---
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, false);

    // 禁用右鍵/長按彈出菜單（防止長按放大鏡）
    window.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        return false;
    };

    // --- 收銀邏輯 ---
    let total = 0, paid = 0, selectedItemName = "", basket = {};
    const prices = {"雞蛋糕大": 100, "雞蛋糕小": 50};
    let pressTimer, itemDeleteTimer;

    function checkOrientation() {
        const isLandscape = window.innerWidth > window.innerHeight;
        document.getElementById('cash-layout').style.display = isLandscape ? 'grid' : 'none';
        document.getElementById('report-panel').style.display = isLandscape ? 'none' : 'flex';
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('load', () => { checkOrientation(); updateReport(); update(); });

    function startSoldOutLongPress(e, name) {
        pressTimer = setTimeout(() => {
            document.getElementById(`btn-${name}`).classList.toggle('sold-out');
            if (navigator.vibrate) navigator.vibrate(100);
        }, 500);
    }

    function startCornLongPress(e) {
        pressTimer = setTimeout(() => {
            document.getElementById('corn-menu').style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate(100);
        }, 500);
    }

    function startItemLongPress(e, name) {
        itemDeleteTimer = setTimeout(() => {
            if (basket[name]) {
                delete basket[name];
                if (navigator.vibrate) navigator.vibrate(150);
                calculateTotal(); update();
            }
        }, 500);
    }

    function endLongPress() { clearTimeout(pressTimer); }
    function endItemLongPress() { clearTimeout(itemDeleteTimer); }
    function closeCornMenu() { document.getElementById('corn-menu').style.display = 'none'; }

    function quickCorn(qty) {
        if (!basket["玉米"]) basket["玉米"] = 0;
        basket["玉米"] += qty;
        selectedItemName = "玉米";
        document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn-玉米').classList.add('selected');
        closeCornMenu(); calculateTotal(); update();
    }

    function selProd(name, price, el) {
        if (el.classList.contains('sold-out')) return;
        if (!basket[name]) basket[name] = 0;
        basket[name] += 1;
        selectedItemName = name;
        document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        calculateTotal(); update();
    }

    function addOrder(qty) {
        if (!selectedItemName) return;
        basket[selectedItemName] += (qty - 1);
        calculateTotal(); update();
    }

    function calculateTotal() {
        let newTotal = 0;
        for (let name in basket) {
            let qty = basket[name];
            if (name === "玉米") {
                let g3 = Math.floor(qty / 3); let r = qty % 3;
                newTotal += (g3 * 110) + (r === 1 ? 40 : (r === 2 ? 75 : 0));
            } else { newTotal += (prices[name] * qty); }
        }
        total = newTotal;
    }

    function removeOne(name) {
        if (basket[name] > 0) {
            basket[name] -= 1;
            if (basket[name] === 0) delete basket[name];
            calculateTotal(); update();
        }
    }

    function addPaid(amount) { paid += amount; update(); }
    function clearPaid() { paid = 0; update(); }

    function update() {
        document.getElementById('total-txt').innerText = `應收: $${total}`;
        document.getElementById('paid-txt').innerText = `實收: $${paid}`;
        const c = document.getElementById('change-txt');
        c.innerText = paid === 0 ? "--" : (paid < total ? `${total - paid}` : `${paid - total}`);
        const listDiv = document.getElementById('order-list');
        listDiv.innerHTML = "";
        let count = 0;
        for (let name in basket) {
            if (count >= 3) break;
            const itemDiv = document.createElement('div');
            itemDiv.className = "order-item";
            itemDiv.onpointerdown = (e) => startItemLongPress(e, name);
            itemDiv.onpointerup = () => endItemLongPress();
            itemDiv.onpointerleave = () => endItemLongPress();
            itemDiv.onclick = () => removeOne(name);
            itemDiv.innerHTML = `<div>${name}</div><span>x ${basket[name]}</span>`;
            listDiv.appendChild(itemDiv);
            count++;
        }
        if (count === 0) listDiv.innerHTML = "<p style='color:#555;text-align:center;margin-top:35px;font-size:0.8rem;'>點餐中...</p>";
    }

    function resetAll() {
        if (total === 0 || paid === 0) {
            total = 0; paid = 0; basket = {}; selectedItemName = "";
            document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
            update(); return;
        }
        let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        logs.unshift({ id: Date.now(), time: timeStr, amount: total, detail: Object.entries(basket).map(([n, q]) => `${n}x${q}`).join(', ') });
        localStorage.setItem('sales_logs', JSON.stringify(logs.slice(0, 300)));
        document.getElementById('main-display').classList.add('success-anim');
        setTimeout(() => document.getElementById('main-display').classList.remove('success-anim'), 500);
        total = 0; paid = 0; basket = {}; selectedItemName = "";
        document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
        updateReport(); update();
    }

    function updateReport() {
        let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
        let sum = logs.reduce((a, b) => a + b.amount, 0);
        document.getElementById('stat-display').innerHTML = `總營收: <b style="color:#f1c40f">$${sum}</b> | 總單數: <b>${logs.length}</b>`;
        document.getElementById('log-container').innerHTML = logs.map(l => `
            <div onclick="voidItem(${l.id}, ${l.amount})" style="border-bottom:1px solid #333; padding:12px 0">
                <span style="color:#2ecc71">[${l.time}] $${l.amount}</span><br><small style="color:#aaa">${l.detail}</small>
            </div>
        `).join('');
    }

    function voidItem(id, amt) {
        if (confirm(`確定作廢 $${amt}？`)) {
            let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
            localStorage.setItem('sales_logs', JSON.stringify(logs.filter(l => l.id !== id)));
            updateReport();
        }
    }

    function clearHistory() { if (confirm("清空數據？")) { localStorage.clear(); updateReport(); } }
</script>
</body>
</html>
