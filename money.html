<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>小攤位收銀 Pro - 專業實戰版</title>
    <style>
        :root {
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; }
        
        body { 
            font-family: -apple-system, sans-serif; margin: 0; padding: 0;
            background-color: #1a1a1a; color: white; height: 100svh; width: 100vw; overflow: hidden;
        }

        /* 橫向布局：商品 / 明細 / 找零 */
        .main-layout {
            display: none;
            grid-template-columns: 0.8fr 1fr 1.6fr; 
            gap: 10px; height: 100%;
            padding: 10px var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        
        /* 直向布局：報表頁面 */
        #report-panel { 
            display: none; flex-direction: column; padding: 20px 25px; 
            height: 100%; overflow-y: auto; background: #000; 
        }

        .panel { background: #2d2d2d; padding: 12px; border-radius: 16px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        
        /* 商品按鈕樣式 */
        .btn-item { flex: 1; font-size: 1.2rem; background: #2980b9; border: 3px solid transparent; border-radius: 15px; color: white; font-weight: bold; position: relative; transition: all 0.2s; }
        .selected { border-color: #fff !important; background: #3498db !important; box-shadow: 0 0 15px rgba(52, 152, 219, 0.6); }
        
        /* 完售樣式修正：移除 pointer-events 防止卡死 */
        .btn-item.sold-out { background: #444 !important; color: #666 !important; opacity: 0.7; }
        .btn-item.sold-out::after { 
            content: "完售"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #e74c3c; font-size: 1.5rem; border: 2px solid #e74c3c; padding: 2px 10px; border-radius: 5px; background: rgba(0,0,0,0.6); 
        }
        
        /* 明細區 */
        .order-list { flex: 1; background: #000; border-radius: 10px; padding: 10px; overflow-y: auto; border: 1px solid #444; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #333; color: #f1c40f; font-size: 1.1rem; }
        
        .qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; height: 45%; }
        .btn-qty { font-size: 1.4rem; background: #6c5ce7; border: none; border-radius: 12px; color: white; font-weight: bold; }
        
        /* 右側核心結帳區 */
        .display-box { background: #000; padding: 8px 15px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #444; min-height: 110px; }
        #total-txt { font-size: 1.4rem; color: #2ecc71; margin: 0; font-weight: bold; }
        #paid-txt { font-size: 1.1rem; color: #81ecec; margin: 2px 0; font-weight: bold; } /* 實收加強色 */
        
        .change-row { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid #333; padding-top: 5px; color: #f1c40f; }
        #change-txt { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 0; }

        .cash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; flex: 1.8; }
        .btn-cash { font-size: 1.6rem; background: #27ae60; border: none; border-radius: 15px; color: white; font-weight: bold; }
        .btn-clear { background: #4b4b4b; color: #bbb; font-size: 1.2rem; }
        
        .btn-reset { height: 65px; background: #e74c3c; font-size: 1.8rem; border: none; border-radius: 18px; color: white; font-weight: bold; box-shadow: 0 4px 0 #b03a2e; }

        /* 動畫反饋 */
        @keyframes successFlash { 0% { background-color: #2ecc71; } 100% { background-color: #000; } }
        .success-anim { animation: successFlash 0.5s ease-out; }

        button:active:not(.btn-reset) { opacity: 0.7; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="cash-layout" class="main-layout">
    <div class="panel">
        <div style="display:flex; flex-direction:column; gap:8px; flex:1">
            <button class="btn-item" id="item-雞蛋糕大" onpointerdown="startLongPress(event, '雞蛋糕大')" onpointerup="cancelLongPress()" onclick="selProd('雞蛋糕大', 100, this)">雞蛋糕-大 $100</button>
            <button class="btn-item" id="item-雞蛋糕小" onpointerdown="startLongPress(event, '雞蛋糕小')" onpointerup="cancelLongPress()" onclick="selProd('雞蛋糕小', 50, this)">雞蛋糕-小 $50</button>
            <button class="btn-item" id="item-玉米" onpointerdown="startLongPress(event, '玉米')" onpointerup="cancelLongPress()" onclick="selProd('玉米', 40, this)">玉米 $40</button>
        </div>
    </div>

    <div class="panel">
        <div id="order-list" class="order-list"></div>
        <div class="qty-grid">
            <button class="btn-qty" onclick="addOrder(1)">+1</button>
            <button class="btn-qty" onclick="addOrder(2)">+2</button>
            <button class="btn-qty" onclick="addOrder(3)">+3</button>
            <button class="btn-qty" onclick="addOrder(4)">+4</button>
            <button class="btn-qty" onclick="addOrder(5)">+5</button>
            <button class="btn-qty" onclick="addOrder(6)">+6</button>
        </div>
    </div>

    <div class="panel">
        <div class="display-box" id="main-display">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><p id="total-txt">應收: $0</p><p id="paid-txt">實收: $0</p></div>
            </div>
            <div class="change-row"><span style="font-size:1.4rem; font-weight:bold;">找零:</span><p id="change-txt">--</p></div>
        </div>
        <div class="cash-grid">
            <button class="btn-cash" onclick="addPaid(1000)">1000</button>
            <button class="btn-cash" onclick="addPaid(500)">500</button>
            <button class="btn-cash" onclick="addPaid(100)">100</button>
            <button class="btn-cash" onclick="addPaid(50)">50</button>
            <button class="btn-cash" onclick="addPaid(10)">10</button>
            <button class="btn-cash btn-clear" onclick="clearPaid()">清實收</button>
        </div>
        <button class="btn-reset" onclick="resetAll()">完成結帳</button>
    </div>
</div>

<div id="report-panel">
    <h2 style="color:#2ecc71">今日營業數據</h2>
    <div id="stat-display" style="background:#2d2d2d; padding:15px; border-radius:12px; margin-bottom:15px; font-size:1.2rem;"></div>
    <div id="log-container"></div>
    <button onclick="clearHistory()" style="background:#c0392b; color:white; border:none; padding:15px; border-radius:12px; margin-top:20px; width:100%">清空當日數據</button>
</div>

<script>
    let total = 0, paid = 0, selectedPrice = 0, selectedItemName = "", basket = {}; 
    const prices = {"雞蛋糕大": 100, "雞蛋糕小": 50, "玉米": 40};
    let longPressTimer;

    // 旋轉偵測
    function checkOrientation() {
        const isLandscape = window.innerWidth > window.innerHeight;
        document.getElementById('cash-layout').style.display = isLandscape ? 'grid' : 'none';
        document.getElementById('report-panel').style.display = isLandscape ? 'none' : 'flex';
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('load', () => { checkOrientation(); updateReport(); update(); });

    // 商品長按 (完售開關)
    function startLongPress(e, name) {
        longPressTimer = setTimeout(() => {
            const btn = document.getElementById(`item-${name}`);
            const isSoldOut = btn.classList.toggle('sold-out');
            if (isSoldOut) {
                btn.classList.remove('selected');
                if (selectedItemName === name) { selectedItemName = ""; selectedPrice = 0; }
            }
            if (navigator.vibrate) navigator.vibrate(60); 
        }, 1000);
    }
    function cancelLongPress() { clearTimeout(longPressTimer); }

    function selProd(name, price, el) {
        if (el.classList.contains('sold-out')) return; // 完售阻斷點擊
        selectedPrice = price; selectedItemName = name;
        document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function addOrder(qty) {
        if (!selectedItemName) return;
        if (!basket[selectedItemName]) basket[selectedItemName] = 0;
        basket[selectedItemName] += qty;
        total += (selectedPrice * qty);
        selectedPrice = 0; selectedItemName = "";
        document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('selected'));
        update();
    }

    // 明細點擊減1 & 長按刪除整項
    let itemPressTimer;
    function startItemPress(name) {
        itemPressTimer = setTimeout(() => {
            total -= (prices[name] * basket[name]);
            delete basket[name];
            if (navigator.vibrate) navigator.vibrate(100);
            update();
        }, 800);
    }
    function cancelItemPress() { clearTimeout(itemPressTimer); }

    function removeOne(name) {
        if (basket[name] > 0) {
            basket[name] -= 1;
            total -= prices[name];
            if (basket[name] === 0) delete basket[name];
            update();
        }
    }

    function addPaid(amount) { paid += amount; update(); }
    function clearPaid() { paid = 0; update(); }

    function update() {
        document.getElementById('total-txt').innerText = `應收: $${total}`;
        document.getElementById('paid-txt').innerText = `實收: $${paid}`;
        const changeDiv = document.getElementById('change-txt');
        changeDiv.innerText = paid === 0 ? "--" : (paid < total ? `${total - paid}` : `${paid - total}`);

        const listDiv = document.getElementById('order-list');
        listDiv.innerHTML = basket && Object.keys(basket).length > 0 ? "" : "<p style='color:#555;text-align:center;margin-top:20px'>等待點餐...</p>";
        for (let name in basket) {
            const itemDiv = document.createElement('div');
            itemDiv.className = "order-item";
            itemDiv.onpointerdown = () => startItemPress(name);
            itemDiv.onpointerup = () => cancelItemPress();
            itemDiv.onclick = () => removeOne(name);
            itemDiv.innerHTML = `<div>${name}</div><span>x ${basket[name]}</span>`;
            listDiv.appendChild(itemDiv);
        }
    }

    function resetAll() {
        if (total === 0) return;
        let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        let detailStr = Object.entries(basket).map(([n, q]) => `${n}x${q}`).join(', ');
        
        logs.unshift({ id: Date.now(), time: timeStr, amount: total, detail: detailStr });
        localStorage.setItem('sales_logs', JSON.stringify(logs.slice(0, 200)));
        
        const display = document.getElementById('main-display');
        display.classList.add('success-anim');
        setTimeout(() => display.classList.remove('success-anim'), 500);

        total = 0; paid = 0; basket = {};
        updateReport(); update();
    }

    function updateReport() {
        let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
        let sum = logs.reduce((a, b) => a + b.amount, 0);
        document.getElementById('stat-display').innerHTML = `總營收: <b style="color:#f1c40f">$${sum}</b> | 單數: <b>${logs.length}</b> 筆`;
        document.getElementById('log-container').innerHTML = logs.map(l => `
            <div onclick="voidItem(${l.id}, ${l.amount})" style="border-bottom:1px solid #333; padding:12px 0">
                <span style="color:#2ecc71;font-weight:bold;">[${l.time}] $${l.amount}</span> <small style="color:#666"></small><br>
                <small style="color:#aaa">${l.detail}</small>
            </div>
        `).join('');
    }

    function voidItem(id, amt) {
        if (confirm(`確定要作廢這筆 $${amt} 的訂單嗎？`)) {
            let logs = JSON.parse(localStorage.getItem('sales_logs') || "[]");
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('sales_logs', JSON.stringify(logs));
            updateReport();
        }
    }

    function clearHistory() { if (confirm("警告：這將徹底清空今日所有營收數據！")) { localStorage.clear(); updateReport(); } }
</script>
</body>
</html>
