<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多益單字</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlY3HyJM2-DN9y6cdGRrz5saZl6a3NeDM",
            authDomain: "doyi-80d8e.firebaseapp.com",
            projectId: "doyi-80d8e",
            storageBucket: "doyi-80d8e.firebasestorage.app",
            messagingSenderId: "456609751811",
            appId: "1:456609751811:web:f601fa6c1c05f49f7b3f36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let _uid = null;

        // 顯示同步狀態
        function setSyncStatus(msg, color = '#64748b') {
            const el = document.getElementById('sync-status');
            if (el) { el.innerText = msg; el.style.color = color; }
        }

        // 更新登入按鈕 UI
        function updateAuthUI(user) {
            const loginBtn = document.getElementById('google-login-btn');
            const logoutBtn = document.getElementById('google-logout-btn');
            const userInfo = document.getElementById('user-info');
            if (!loginBtn) return;
            if (user) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-flex';
                if (userInfo) userInfo.innerText = user.displayName || user.email || '';
            } else {
                loginBtn.style.display = 'inline-flex';
                logoutBtn.style.display = 'none';
                if (userInfo) userInfo.innerText = '';
            }
        }

        // 從 Firestore 讀取資料
        async function loadFromFirestore(uid) {
            setSyncStatus('☁️ 雲端同步中...');
            const docRef = doc(db, 'users', uid);
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.customVocab !== undefined)
                        localStorage.setItem('customVocab', JSON.stringify(data.customVocab));
                    if (data.markedWords !== undefined)
                        localStorage.setItem('markedWords', JSON.stringify(data.markedWords));
                    if (data.heartedWords !== undefined)
                        localStorage.setItem('heartedWords', JSON.stringify(data.heartedWords));
                    if (data.appState !== undefined)
                        localStorage.setItem('appState', JSON.stringify(data.appState));
                    setSyncStatus('✅ 已同步', '#16a34a');
                } else {
                    setSyncStatus('🆕 第一次登入，資料將自動上傳', '#f59e0b');
                }
            } catch(e) {
                setSyncStatus('❌ 同步失敗（離線模式）', '#dc2626');
                console.error('Firestore read error:', e);
            }

            window._firebaseReady = true;
            window._firebaseUid = uid;
            if (window._onFirebaseReady) window._onFirebaseReady();
        }

        // 寫入 Firestore（防抖）
        let _writeTimer = null;
        window._saveToFirestore = function(key, value) {
            if (!_uid) return;
            // appState（卡片位置）靜默同步，不顯示儲存中
            if (key !== 'appState') setSyncStatus('💾 儲存中...', '#f59e0b');
            clearTimeout(_writeTimer);
            _writeTimer = setTimeout(async () => {
                const docRef = doc(db, 'users', _uid);
                const payload = {};
                ['customVocab', 'markedWords', 'heartedWords', 'appState'].forEach(k => {
                    const raw = localStorage.getItem(k);
                    try { payload[k] = raw ? JSON.parse(raw) : null; } catch(e) { payload[k] = null; }
                });
                try {
                    await setDoc(docRef, payload, { merge: true });
                    if (key !== 'appState') setSyncStatus('✅ 已同步', '#16a34a');
                } catch(e) {
                    setSyncStatus('❌ 儲存失敗', '#dc2626');
                    console.error('Firestore write error:', e);
                }
            }, 1000);
        };

        // Google 登入
        window._googleLogin = async function() {
            try {
                setSyncStatus('🔐 登入中...');
                await signInWithPopup(auth, provider);
            } catch(e) {
                setSyncStatus('❌ 登入失敗', '#dc2626');
                console.error('Google login error:', e);
            }
        };

        // 登出
        window._googleLogout = async function() {
            const ok = await showConfirm('登出', '確定要登出嗎？本機資料將被清除。', '登出', true);
            if (!ok) return;
            await signOut(auth);
            _uid = null;
            setSyncStatus('👋 已登出', '#64748b');
            updateAuthUI(null);
            // 清除本機資料，重新載入頁面
            ['customVocab','markedWords','heartedWords','appState'].forEach(k => localStorage.removeItem(k));
            location.reload();
        };

        // 監聽登入狀態
        onAuthStateChanged(auth, async (user) => {
            updateAuthUI(user);
            if (user) {
                _uid = user.uid;
                await loadFromFirestore(_uid);
            } else {
                // 未登入：讓 app 照常跑（純 localStorage）
                setSyncStatus('🔒 未登入（資料僅存本機）', '#94a3b8');
                window._firebaseReady = true;
                if (window._onFirebaseReady) window._onFirebaseReady();
            }
        });
    </script>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
        }

        .container { max-width: 800px; width: 100%; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; }

        /* 導航分頁 */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { 
            padding: 10px 15px; border: none; border-radius: 20px; 
            cursor: pointer; font-size: 15px; transition: 0.3s; 
            background: #e0e0e0; color: #555; font-weight: bold;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); }
        .tab-btn.manage { background: #34495e; color: white; }

        /* 篩選區 */
        .filter-section { 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        select, button.action-btn { padding: 8px 12px; font-size: 15px; border-radius: 5px; border: 1px solid #ddd; }
        
        /* 通用 */
        .hidden { display: none !important; }
        .feedback-text { font-weight: bold; min-height: 24px; margin-top: 10px; }
        .nav-controls { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-btn { background: white; border: 1px solid #ccc; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        /* 跳轉選單樣式優化 */
        .jump-container { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .jump-select { 
            max-width: 200px; padding: 5px; border-radius: 5px; border: 1px solid #ddd; 
            font-size: 13px; color: #666; cursor: pointer; background: #fff;
        }
        /* 點選時讓文字變深，增加辨識度 */
        .jump-select:focus { border-color: var(--primary); color: #333; }

        /* 1. 列表模式 */
        #list-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .vocab-item {
            background: var(--card); padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid transparent; transition: 0.3s; position: relative;
        }
        .vocab-item.marked { border-left-color: var(--secondary); background: #fffcf5; }
        .vocab-item.custom { border-left-color: #9b59b6; }
        .word-info b { font-size: 18px; color: var(--primary); display: block; }
        .word-info span { font-size: 14px; color: #666; }
        .star-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: #ccc; transition: 0.2s; }
        .vocab-item.marked .star-btn, .learning-card.marked .star-btn { color: var(--secondary); transform: scale(1.2); }
        .del-btn { color: #e74c3c; font-size: 12px; cursor: pointer; margin-left: 10px; border: 1px solid #e74c3c; padding: 2px 5px; border-radius: 4px; background: white; }

        /* 2. 單字卡 (學習模式) */
        #learning-view { display: none; text-align: center; }
        .learning-card {
            background: white; padding: 40px 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto;
            position: relative; border-top: 5px solid var(--primary);
        }
        .learning-card.marked { border-top-color: var(--secondary); background: #fffcf5; }
        .learn-word { font-size: 40px; font-weight: bold; color: var(--text); margin: 10px 0; line-height: 1.2; word-break: break-word; }
        .learn-def {
            font-size: 40px;
            font-weight: bold;
            color: var(--text);
            margin-top: 10px;
            border-top: none;
            padding-top: 0;
            text-align: center;
            word-break: break-word;
        }

        .card-star-pos { position: absolute; top: 15px; right: 20px; font-size: 32px; }
        .big-play-btn { 
            background: #e1f0ff; color: var(--primary); border: none; width: 60px; height: 60px; 
            border-radius: 50%; font-size: 24px; cursor: pointer; margin-top: 20px; transition: 0.2s;
        }
        .big-play-btn:hover { background: var(--primary); color: white; }

        /* ✅ 單字卡翻卡（learning-view） */
.learning-card { 
    perspective: 1200px;
}

.learn-flip {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
}

.learn-flip.flipped {
    transform: rotateY(180deg);
}

.learn-face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    width: 100%;
    min-height: 180px;
}

/* 正面正常流，撐開 flip 高度 */
.learn-front {
    position: relative;
}

/* 背面絕對疊加，翻轉後才可見，但用透明 sizer 撐高度 */
.learn-back {
    position: absolute;
    top: 0; left: 0; right: 0;
    transform: rotateY(180deg);
}

/* 透明佔位撐開高度：翻面後背面內容高度同步給正面 */
.learn-back-sizer {
    visibility: hidden;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    width: 100%;
}

.learn-hint {
    margin-top: 10px;
    font-size: 13px;
    color: #999;
}

.learning-card button { cursor: pointer; }


        /* 3. 發音練習 (翻卡) */
        #flashcard-view { display: none; text-align: center; perspective: 1000px; }
        .flashcard {
            width: 320px; height: 240px; margin: 0 auto; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: white; padding: 20px; box-sizing: border-box; border: 2px solid #eee;
        }
        .card-front h2 { font-size: 32px; margin: 0 0 10px 0; color: var(--text); }
        .card-back { transform: rotateY(180deg); background: var(--primary); color: white; }
        .card-back p { font-size: 24px; margin: 0; }
        .mic-btn {
            background: #fff; border: 2px solid var(--primary); color: var(--primary);
            width: 60px; height: 60px; border-radius: 50%; font-size: 24px;
            display: flex; align-items: center; justify-content: center; margin: 20px auto 10px; cursor: pointer;
        }
        .mic-btn.recording { background: var(--danger); color: white; border-color: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); } 70% { box-shadow: 0 0 0 15px rgba(231,76,60,0); } 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); } }

        /* 4. 測驗模式 */
        #quiz-view { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .quiz-question { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: #f8f9fa; border: 2px solid #e9ecef; padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }

        /* 5. 拼字模式 (優化版) */
        #spelling-view { display: none; text-align: center; background: white; padding: 30px 30px 40px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 頂部工具列：將模式與跳轉選單並排，縮小字體 */
        .spelling-top-bar {
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px;
            margin-bottom: 30px; /* 與下方內容拉開距離 */
            opacity: 0.7; transition: opacity 0.3s;
        }
        .spelling-top-bar:hover { opacity: 1; } /* 滑鼠移過去才變清楚 */

        /* 模式選擇器：極簡化 */
        .mode-selector { display: inline-flex; gap: 5px; background: none; padding: 0; }
        .mode-label { 
            padding: 4px 10px; cursor: pointer; border-radius: 15px; transition: 0.3s; 
            font-size: 13px; color: #888; border: 1px solid transparent;
        }
        .mode-label input { display: none; }
        .mode-label:has(input:checked) { 
            background: #f0f7ff; color: var(--primary); border-color: #d0e3ff; font-weight: bold;
        }

        .spelling-input { 
            font-size: 28px; padding: 10px; width: 80%; text-align: center; letter-spacing: 2px; 
            border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .spelling-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,144,226,0.1); }
        .spelling-input.correct { border-color: var(--success); color: var(--success); background: #e8f8f5; }
        .spelling-input.wrong { border-color: var(--danger); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .hint-display { min-height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 25px; }
        .hint-word { font-size: 40px; font-weight: bold; color: var(--primary); margin: 0 0 5px 0; }
        .hint-def { font-size: 28px; color: #333; margin: 0; font-weight: bold; }
        .hint-sub { font-size: 18px; color: #777; margin: 0; }

        /* 6. 管理模式 */
        #manage-view { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 120px; }
        .add-btn { background: var(--success); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .bulk-section { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .bulk-textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; font-size: 14px; resize: vertical; box-sizing: border-box; }
        .bulk-actions { margin-top: 10px; display: flex; justify-content: flex-end; gap: 10px; }

        .custom-list { margin-top: 20px; max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; }
        .custom-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }

        /* === Modern UI refinement === */

            --primary: #2563eb;
            --secondary: #f59e0b;
            --success: #16a34a;
            --danger: #dc2626;
            --heart: #e11d48;
            --bg: #eef2f7;
            --card: #ffffff;
            --text: #172033;
            --muted: #64748b;
            --border: #dbe3ef;

        }

            -webkit-user-select: none;

        }

        .heart-btn:hover { color: var(--heart); background:#fff1f2; box-shadow: 0 8px 18px rgba(225, 29, 72, .18); }
        .vocab-item.marked .star-btn, .learning-card.marked .star-btn { color: var(--secondary); background:#fffbeb; transform: scale(1.08); }
        .vocab-item.hearted .heart-btn, .learning-card.hearted .heart-btn { color: var(--heart); background:#fff1f2; transform: scale(1.08); }
        .card-mark-controls { position:absolute; top:16px; right:18px; display:flex; gap:8px; z-index:5; }
        .card-star-pos, .card-heart-pos { position: static; font-size: 25px; }
        .learning-card.hearted { border-top-color: var(--heart); }
        .bulk-section.only-bulk { margin-top: 0; border-top: 0; padding-top: 0; }
        .bulk-category-input, .bulk-textarea { width:100%; box-sizing:border-box; margin-bottom:12px; }
        .bulk-category-input { padding: 12px 14px; border:1px solid var(--border); border-radius: 12px; font-size:15px; }
        .bulk-textarea { min-height: 180px; padding: 14px; border-radius: 14px; line-height: 1.6; }

        .bulk-import-btn { background: var(--primary) !important; border-radius: 12px; padding: 11px 22px; box-shadow: 0 10px 22px rgba(37, 99, 235, .22); }
        .big-play-btn:hover { transform: translateY(-1px) scale(1.03); }
        @media (max-width: 640px) { 
            body { padding: 10px; }
            h1 { font-size: 20px; margin-bottom: 12px; }
            #list-view { grid-template-columns: 1fr; }
            .quiz-options { grid-template-columns: 1fr; }
            .bulk-actions { justify-content: stretch; }
            .bulk-actions button { flex: 1; }

            /* 單字卡手機適配 */
            .learning-card { padding: 24px 14px; border-radius: 12px; }
            .learn-word { font-size: 30px; }

        /* ===== Toast 提示 ===== */
        #toast-container {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px;

        }
        .toast {
            background: #1e293b; color: white; padding: 12px 22px; border-radius: 24px;

            transition: opacity .3s, transform .3s;
            pointer-events: none; max-width: 320px; text-align: center; line-height: 1.5;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }
        .toast.warn    { background: #d97706; }

        /* ===== 自訂 Confirm Modal ===== */
        #modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 9998;
            align-items: center; justify-content: center;
        }
        #modal-overlay.show { display: flex; }
        #modal-box {
            background: white; border-radius: 18px; padding: 28px 24px 20px;
            max-width: 320px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
        }
        #modal-box h3 { margin: 0 0 10px; font-size: 17px; color: #1e293b; }
        #modal-box p  { margin: 0 0 20px; font-size: 14px; color: #475569; line-height: 1.6; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; touch-action: manipulation; }
        .modal-cancel { background: #f1f5f9; color: #475569; }
        .modal-confirm { background: #dc2626; color: white; }
        .modal-confirm.safe { background: var(--primary); }
    </style>
</head>

<script>
    // ===== Toast 提示 =====
    function showToast(msg, type = '', duration = 2500) {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        el.className = 'toast' + (type ? ' ' + type : '');
        el.innerText = msg;
        container.appendChild(el);
        requestAnimationFrame(() => { el.classList.add('show'); });
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => el.remove(), 350);
        }, duration);

            confirmBtn.innerText = confirmText;
            confirmBtn.className = 'modal-confirm' + (danger ? '' : ' safe');
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('show');
            const cleanup = (result) => {
                overlay.classList.remove('show');
                confirmBtn.replaceWith(confirmBtn.cloneNode(true)); // 移除舊 listener
                document.getElementById('modal-cancel-btn').replaceWith(document.getElementById('modal-cancel-btn').cloneNode(true));
                resolve(result);
            };
            document.getElementById('modal-confirm-btn').addEventListener('click', () => cleanup(true), { once: true });
            document.getElementById('modal-cancel-btn').addEventListener('click', () => cleanup(false), { once: true });
        });

    // 初始化（等 Firebase 就緒後再執行）
    function appInit() {
        loadData();
        loadSavedState();
        initCategoryManager();
        document.getElementById("spell-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") checkSpelling();
        });

        // 手機鍵盤彈起時，自動捲動讓輸入框可見
        document.getElementById("spell-input").addEventListener("focus", function() {
            setTimeout(() => {
                this.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 400);
        });

        // ===== 手機左右滑動換卡 =====
        let touchStartX = 0;
        let touchStartY = 0;
        const SWIPE_THRESHOLD = 50; // px

        function addSwipe(el, onLeft, onRight) {
            if (!el) return;
            el.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            el.addEventListener('touchmove', e => {
                const dx = Math.abs(e.touches[0].clientX - touchStartX);
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                // 水平滑動超過垂直時，鎖住頁面滾動
                if (dx > dy && dx > 10) {
                    e.preventDefault();
                }
            }, { passive: false });

            el.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx < 0) onLeft();
                    else onRight();
                }
            }, { passive: true });
        }

        addSwipe(document.getElementById('learning-view'), nextCard, prevCard);
        addSwipe(document.getElementById('flashcard-view'), nextCard, prevCard);
    }

    window.onload = () => {
        if (window._firebaseReady) {
            appInit();
        } else {
            // Firebase 尚未就緒，等它通知
            window._onFirebaseReady = appInit;
            // 最多等 5 秒，超時就直接用 localStorage 跑
            setTimeout(() => {
                if (!window._firebaseReady) {
                    console.warn('Firebase timeout, running in offline mode');
                    window._firebaseReady = true;
                    appInit();
                }
            }, 5000);
        }
    };

function loadData() {
    // ✅ 讀取星星與愛心標記
    const storedMarked = localStorage.getItem('markedWords');
    markedSet = storedMarked ? new Set(JSON.parse(storedMarked)) : new Set();

    const storedHearts = localStorage.getItem('heartedWords');
    heartSet = storedHearts ? new Set(JSON.parse(storedHearts)) : new Set();

    const stored = localStorage.getItem('customVocab');
    customData = stored ? JSON.parse(stored) : [];

    const formattedCustom = customData.map(i => ({
        ...i,
        p: i.cat || i.p || "custom",
        cat: i.cat || i.p || "custom",
        isCustom: true,
        marked: markedSet.has(i.w),
        hearted: heartSet.has(i.w)
    }));

    // 保留既有分類順序，新增匯入分類依序接在後面。
    fullData = [...defaultData, ...formattedCustom].map(item => ({
        ...item,
        marked: markedSet.has(item.w),
        hearted: heartSet.has(item.w),
        isCustom: item.isCustom || false
    }));

    refreshCategoryOptions();
    buildCategoryChips();
}

function refreshCategoryOptions() {
    const group = document.getElementById('category-options');
    if (!group) return;

    const seen = new Set();
    const cats = [];
    customData.forEach(item => {
        const cat = (item.cat || item.p || '').trim();
        if (cat && cat !== 'custom' && !seen.has(cat)) {
            seen.add(cat);
            cats.push(cat);
        }
    });

    group.innerHTML = cats.map(cat => `<option value="${cat}">${cat}</option>`).join('');
}

    function loadSavedState() {

        if (saved) {

            // 恢復快速篩選
            if (state.quickFilter) {
                activeQuickFilter = state.quickFilter;

            currentIndex = (state.cardIdx < currentFiltered.length) ? state.cardIdx : 0;
            currentSpellIndex = (state.spellIdx < currentFiltered.length) ? state.spellIdx : 0;
            
            spellMode = state.spellMode || 'hard';
            document.querySelector(`input[name="spellMode"][value="${spellMode}"]`).checked = true;

            if (state.mode) {
                const btn = document.getElementById(state.mode);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'cat-chip' + (selectedCategories.has(cat) ? ' selected' : '');
            const dot = document.createElement('span');
            dot.className = 'chip-dot';
            btn.appendChild(dot);
            btn.appendChild(document.createTextNode(' ' + cat));
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (selectedCategories.has(cat)) {
                    selectedCategories.delete(cat);
                    btn.classList.remove('selected');

    function filterData(resetIndex = true) {
        // Step 1: 快速篩選
        let base;
        if (activeQuickFilter === 'all')      base = fullData;
        else if (activeQuickFilter === 'marked')  base = fullData.filter(i => i.marked);
        else if (activeQuickFilter === 'hearted') base = fullData.filter(i => i.hearted);
        else if (activeQuickFilter === 'both')    base = fullData.filter(i => i.marked && i.hearted);
        else if (activeQuickFilter === 'wrong')   base = Array.from(wrongAnswers);
        else if (activeQuickFilter === 'custom')  base = fullData.filter(i => i.isCustom);
        else base = fullData;

        // Step 2: 分類多選疊加（選了分類才篩，沒選就全部）
        if (selectedCategories.size > 0 && activeQuickFilter !== 'wrong') {
            base = base.filter(i => selectedCategories.has(i.p));
        }

        currentFiltered = base;

        // 同步舊的 select（給 saveState 讀取用）
        document.getElementById('page-filter').value = activeQuickFilter === 'all' ? 'all' : activeQuickFilter;

        if (resetIndex) {
            currentIndex = 0;
            currentSpellIndex = 0;
        }

        // 統計標籤
        const total = currentFiltered.length;
        const starCount = currentFiltered.filter(i => i.marked).length;
        const heartCount = currentFiltered.filter(i => i.hearted).length;
        let statsText = `共 ${total} 個單字`;
        if (starCount > 0 || heartCount > 0) statsText += ` ｜ ⭐${starCount} ❤️${heartCount}`;
        document.getElementById('stats-info').innerText = statsText;

        if(document.getElementById('list-view').style.display !== 'none') renderList();
        updateJumpMenus();
        saveState();
    }

        setupJumpMenu('spelling-jump', currentSpellIndex, (val) => jumpToSpelling(val));

    function setupJumpMenu(id, activeIndex, callback) {
        const select = document.getElementById(id);
        if (!select) return;

        const render = (showEnglish) => {
            if (currentFiltered.length === 0) {
                select.innerHTML = '<option>無單字</option>';
                return;
            }
            select.innerHTML = currentFiltered.map((item, idx) => {
                const text = showEnglish ? `${idx + 1}. ${item.w}` : `第 ${idx + 1} 個單字`;
                return `<option value="${idx}" ${idx === activeIndex ? 'selected' : ''}>${text}</option>`;
            }).join('');
        };
        render(false);
        select.onfocus = () => render(true);
        select.onblur = () => render(false);
        select.onchange = (e) => { callback(e.target.value); render(false); select.blur(); };
        select.onmousedown = () => render(true);
    }

// ✅ 批量加入單字到已有分類（格式與批量匯入相同）
function batchAddToExistingCategory() {
    const cat = document.getElementById('add-to-cat-select').value.trim();
    const text = document.getElementById('add-to-cat-bulk').value;
    const feedback = document.getElementById('add-to-cat-feedback');

    if (!cat) { feedback.style.color = '#dc2626'; feedback.innerText = '⚠️ 請先選擇分類'; return; }
    if (!text.trim()) { feedback.style.color = '#dc2626'; feedback.innerText = '⚠️ 請輸入單字清單'; return; }

    const lines = text.split('\n');
    let addedCount = 0;
    let skippedCount = 0;
    lines.forEach(line => {
        line = line.trim().replace(/^[•\-\*0-9\.]+\s*/, '');
        const match = line.match(/^([a-zA-Z\s\-\/\(\)\*]+?)[\s\t\:\-]+(.+)$/);
        if (match && match[1] && match[2]) {
            let w = match[1].trim();
            const d = match[2].trim();
            let starCount = 0;
            if (w.endsWith("***"))      { starCount = 3; w = w.slice(0, -3).trim(); }
            else if (w.endsWith("**")) { starCount = 2; w = w.slice(0, -2).trim(); }
            else if (w.endsWith("*"))  { starCount = 1; w = w.slice(0, -1).trim(); }

            if (fullData.some(i => i.w.toLowerCase() === w.toLowerCase())) {
                skippedCount++;
            } else {
                customData.push({ p: cat, cat: cat, w: w, d: d, stars: starCount, isCustom: true });
                addedCount++;
            }
        }
    });

    if (addedCount > 0) {
        localStorage.setItem('customVocab', JSON.stringify(customData));
        if (window._saveToFirestore) window._saveToFirestore('customVocab', customData);
        loadData();
        filterData(false);
        initCategoryManager();
        document.getElementById('add-to-cat-bulk').value = '';
        feedback.style.color = '#16a34a';
        feedback.innerText = `✅ 成功加入 ${addedCount} 個單字到「${cat}」${skippedCount > 0 ? `（${skippedCount} 個重複已略過）` : ''}`;
    } else {
        feedback.style.color = '#dc2626';
        feedback.innerText = skippedCount > 0 ? `⚠️ 所有單字皆已存在，沒有新增任何單字` : '⚠️ 無法辨識任何單字，請確認格式';
    }
    setTimeout(() => { feedback.innerText = ''; }, 4000);
}

    })

        const backupUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(currentFetchedExample)}`;

        if (currentFiltered.length === 0) return;
        const card = currentFiltered[currentIndex];
        document.getElementById('learn-word').innerText = card.w;

// 👇 加上這個：更新左上角的星星個數
const starsDisplay = document.getElementById('card-stars-display');
if (starsDisplay) {
    if (card.stars === 3) starsDisplay.innerText = "★★★";
    else if (card.stars === 2) starsDisplay.innerText = "★★";
    else if (card.stars === 1) starsDisplay.innerText = "★";
    else starsDisplay.innerText = ""; // 沒標示星星就不顯示
}
        document.getElementById('learn-def').innerText = card.d;
        fetchExampleFromNetwork(card.w);
        document.getElementById('learn-progress').innerText = `${currentIndex + 1} / ${currentFiltered.length}`;
        const starBtn = document.getElementById('learn-star-btn');
        const heartBtn = document.getElementById('learn-heart-btn');

        if (heartBtn) heartBtn.innerText = card.hearted ? '♥' : '♡';
        const cardContainer = document.getElementById('learn-card-container');
        if(card.marked) cardContainer.classList.add('marked'); else cardContainer.classList.remove('marked');
        if(card.hearted) cardContainer.classList.add('hearted'); else cardContainer.classList.remove('hearted');

    function toggleMarkCurrent() {
        if (currentFiltered.length === 0) return;
        const item = currentFiltered[currentIndex];
        const originalIndex = fullData.indexOf(item);
        toggleMark(originalIndex);
        updateLearningCard();

    function toggleHeartCurrent() {
        if (currentFiltered.length === 0) return;

        toggleHeart(originalIndex);
        updateLearningCard();

    function setLearnFlip(isFlip) {
        learnFlipped = isFlip;

function toggleLearnFlip() {
    setLearnFlip(!learnFlipped);
}

    // --- 發音卡片 ---
    function updateCard() {
        if (currentFiltered.length === 0) return;
        const card = currentFiltered[currentIndex];
        document.getElementById('card-word').innerText = card.w;
        document.getElementById('card-def-hint').innerText = card.d;
        document.getElementById('card-def').innerText = card.d;
        document.getElementById('main-card').classList.remove('flipped');
        document.getElementById('card-progress').innerText = `${currentIndex + 1} / ${currentFiltered.length}`;
        updateJumpMenus();
    }
    function nextCard() { if(isAutoPlaying) stopAutoPlay(); currentIndex = (currentIndex + 1) % currentFiltered.length; updateCard(); updateLearningCard(); saveState(); }
    function prevCard() { if(isAutoPlaying) stopAutoPlay(); currentIndex = (currentIndex - 1 + currentFiltered.length) % currentFiltered.length; updateCard(); updateLearningCard(); saveState(); }
    function speakCurrentCard() { playSound(currentFiltered[currentIndex].w); }

    // ===== 自動播放 =====
    let autoPlayTimer = null;
    let isAutoPlaying = false;
    const AUTO_PLAY_INTERVAL = 4000; // 4秒換下一張

    function toggleAutoPlay() {
        if (isAutoPlaying) {
            stopAutoPlay();
        } else {
            startAutoPlay();
        }
    }

    function startAutoPlay() {
        isAutoPlaying = true;
        const btn = document.getElementById('autoplay-btn');
        const status = document.getElementById('autoplay-status');
        if (btn) { btn.innerText = '⏹ 停止'; btn.style.color = '#dc2626'; btn.style.borderColor = '#fca5a5'; }
        if (status) status.innerText = '';

        function speakCard() {
            const card = currentFiltered[currentIndex];
            if (!card) return;
            // 先講英文
            const engMsg = new SpeechSynthesisUtterance(card.w);
            engMsg.lang = 'en-US';
            engMsg.rate = 0.85;
            if (STANDARD_VOICE) engMsg.voice = STANDARD_VOICE;

            // 再講中文（取中文部分，去掉 * 後面的英文補充）
            const zhText = card.d.replace(/\s*\*.*$/, '').trim();

            speechSynthesis.cancel();
            speechSynthesis.speak(engMsg);
            engMsg.onend = () => { playChineseGoogleTTS(zhText); };
        }

        // 先播當前
        speakCard();
        autoPlayTimer = setInterval(() => {
            currentIndex = (currentIndex + 1) % currentFiltered.length;
            updateCard();
            updateLearningCard();
            saveState();
            speakCard();
        }, AUTO_PLAY_INTERVAL);
    }

    function stopAutoPlay() {
        isAutoPlaying = false;
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
        // 停止 Google TTS audio
        if (window._zhAudio) { window._zhAudio.pause(); window._zhAudio = null; }
        const btn = document.getElementById('autoplay-btn');
        const status = document.getElementById('autoplay-status');
        if (btn) { btn.innerText = '▶ 自動播放'; btn.style.color = '#475569'; btn.style.borderColor = ''; }
        if (status) status.innerText = '';
    }

    // ===== Google TTS 中文發音（清晰度遠優於 Web Speech API）=====
    function playChineseGoogleTTS(text) {
        if (!text) return;
        // 清理文字：只保留中文、數字、基本標點
        const cleanText = text.replace(/\s*\*.*$/, '').trim();
        if (!cleanText) return;

        // 停止前一個音訊
        if (window._zhAudio) { window._zhAudio.pause(); window._zhAudio = null; }

        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=zh-TW&client=tw-ob&ttsspeed=0.8`;
        const audio = new Audio(url);
        audio.crossOrigin = 'anonymous';
        window._zhAudio = audio;
        audio.play().catch(() => {
            // fallback: Web Speech API
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.lang = 'zh-TW';
            msg.rate = 0.75;
            const voices = speechSynthesis.getVoices();
            const v = voices.find(v => v.lang === 'zh-TW') || null;
            if (v) msg.voice = v;
            speechSynthesis.speak(msg);
        });
    }

// --- 語音辨識 (精準且穩定版) ---
const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;

if (recognition) { 
    recognition.lang = 'en-US'; 
    recognition.interimResults = false; 
    // 設定為 1，只取最準確的那一個結果
    recognition.maxAlternatives = 1; 
}

function startRecognition() {
    if (!recognition || currentFiltered.length === 0) {
        showToast('⚠️ 無法啟動語音辨識', 'warn');
        return;
    }

    const micBtn = document.getElementById('mic-btn');
    const feedback = document.getElementById('speech-feedback');
    
    // 1. 嚴格清理目標單字：轉小寫、去前後空格、去除非英文字元
    const rawTarget = currentFiltered[currentIndex].w.toLowerCase();
    const validTargets = rawTarget.split(/[\/,\(\)]/)
        .map(t => t.trim().toLowerCase().replace(/[^a-z0-9\s]/g, ''))
        .filter(t => t.length > 0);

    micBtn.classList.add('recording'); 
    feedback.innerText = "👂 聆聽中...";
    
    try {
        recognition.start();
    } catch(e) {
        console.error("Recognition already started");
    }

    recognition.onresult = (e) => {
        // 取得辨識結果
        const result = e.results[0][0]; 
        // 2. 嚴格清理辨識出的文字
        const spoken = result.transcript.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '');
        
        console.log("辨識到:", spoken);
        console.log("目標清單:", validTargets);

        let isCorrect = false;

        // 3. 執行完全吻合比對
        for (let target of validTargets) {
            if (spoken === target) {
                isCorrect = true;
                break;
            }
        }

        // 4. 顯示結果
        if (isCorrect) {
            feedback.innerHTML = `✅ 正確！<br><span style="font-size:12px; color:#888;">(辨識為: ${spoken})</span>`;
            feedback.style.color = "var(--success)";
            if (typeof playBeep === 'function') playBeep('success');
        } else {
            // 如果不正確，顯示辨識到的字供使用者參考
            feedback.innerHTML = `❌ 聽起來像: "${spoken}"<br><span style="font-size:12px;">請再試一次</span>`;
            feedback.style.color = "var(--danger)";
            if (typeof playBeep === 'function') playBeep('error');
            if (typeof wrongAnswers !== 'undefined') wrongAnswers.add(currentFiltered[currentIndex]);
        }
        micBtn.classList.remove('recording');
    };

    recognition.onerror = (event) => {
        micBtn.classList.remove('recording');
        if (event.error === 'no-speech') {
            feedback.innerText = "🔇 沒聽到聲音，請重試";
        } else {
            feedback.innerText = "⚠️ 辨識失敗: " + event.error;
        }
    };

    recognition.onend = () => micBtn.classList.remove('recording');
}

// --- 測驗（不重複出題 + 出完結束 + 顯示答錯題目） ---
let currentQuizItem = null;

// 題庫（本輪還沒出過的題）
let quizPool = [];
let quizTotal = 0;
let quizCorrect = 0;
let quizWrong = 0;
let quizWrongList = []; // [{w,d}...]

function shuffleArray(arr) {
    // Fisher-Yates shuffle
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startQuizRound() {
    // 依照目前篩選範圍 currentFiltered 開新的一輪
    quizPool = shuffleArray([...currentFiltered]); // 複製一份，不動到原陣列
    quizTotal = quizPool.length;
    quizCorrect = 0;
    quizWrong = 0;
    quizWrongList = [];
    currentQuizItem = null;

    // UI 清空
    document.getElementById('quiz-feedback').innerText = "";
    document.getElementById('next-quiz-btn').classList.add('hidden');

    nextQuiz();
}

function renderQuizEnd() {
    const qText = document.getElementById('q-text');
    const qOptions = document.getElementById('q-options');
    const feedback = document.getElementById('quiz-feedback');

    qText.innerText = "✅ 測驗結束！";
    qOptions.innerHTML = "";

    const wrongHtml = quizWrongList.length
        ? `<div style="text-align:left; margin-top:12px; line-height:1.6;">
             <b>❌ 答錯題目（${quizWrongList.length}）</b><br>
             ${quizWrongList.map((x, i) => `${i + 1}. <b>${x.w}</b> — ${x.d}`).join("<br>")}
           </div>`
        : `<div style="margin-top:12px;"><b>太強了！本輪全對 🎉</b></div>`;

    feedback.innerHTML = `
        <div style="font-size:16px; color:#333;">
            總題數：${quizTotal}　✅答對：${quizCorrect}　❌答錯：${quizWrong}
        </div>
        ${wrongHtml}
        <div style="margin-top:16px;">
            <button class="nav-btn" style="background:var(--primary); color:white; border:none;"
                onclick="startQuizRound()">再測一次（同範圍）</button>
        </div>
    `;
}

function nextQuiz() {
    // 題量不足 (需4個) — 仍保留原邏輯
    if (currentFiltered.length < 4) {
        document.getElementById('q-text').innerText = "單字量不足 (需4個)";
        document.getElementById('q-options').innerHTML = "";
        document.getElementById('quiz-feedback').innerText = "";
        document.getElementById('next-quiz-btn').classList.add('hidden');
        return;
    }

    // 如果題庫還沒建立/或範圍改了，重新開始一輪
    if (!quizPool || quizPool.length === 0 && quizTotal === 0) {
        startQuizRound();
        return;
    }

    // 題庫出完：結束
    if (quizPool.length === 0) {
        renderQuizEnd();
        return;
    }

    // UI reset
    document.getElementById('next-quiz-btn').classList.add('hidden');
    document.getElementById('quiz-feedback').innerText = "";
    document.getElementById('q-options').innerHTML = "";

    // 取出下一題（不放回，所以不重複）
    currentQuizItem = quizPool.shift();

    // 選項：正確 + 3 個干擾（從 currentFiltered 抽，不可重複）
    const options = [currentQuizItem];
    while (options.length < 4) {
        const r = currentFiltered[Math.floor(Math.random() * currentFiltered.length)];
        if (!options.includes(r)) options.push(r);
    }
    options.sort(() => Math.random() - 0.5);

    document.getElementById('q-text').innerText = currentQuizItem.w;
    document.getElementById('q-options').innerHTML = options
        .map(opt => `<button class="option-btn" onclick="checkAnswer(this, '${opt.w.replace(/'/g, "\\'")}')">${opt.d}</button>`)
        .join('');
}

function checkAnswer(btn, word) {
    // 禁用全部選項
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    if (word === currentQuizItem.w) {
        btn.classList.add('correct');
        playBeep('success');
        quizCorrect++;
        document.getElementById('quiz-feedback').innerText = "🎉 答對了！";
    } else {
        btn.classList.add('wrong');
        playBeep('error');
        quizWrong++;

        // 加入「答錯」集合（你原本的功能）
        wrongAnswers.add(currentQuizItem);

        // 記錄答錯清單（避免重複列同一題）
        if (!quizWrongList.some(x => x.w === currentQuizItem.w)) {
            quizWrongList.push({ w: currentQuizItem.w, d: currentQuizItem.d });
        }

        document.getElementById('quiz-feedback').innerText = `⚠️ 正確是：${currentQuizItem.d}`;

        // 把正確選項標綠
        document.querySelectorAll('.option-btn').forEach(b => {
            if (b.innerText === currentQuizItem.d) b.classList.add('correct');
        });
    }

    // 顯示下一題按鈕（題庫沒了就顯示「結束」）
    const nextBtn = document.getElementById('next-quiz-btn');
    nextBtn.classList.remove('hidden');
    nextBtn.innerText = (quizPool.length === 0) ? "看結果 ✅" : "下一題 ➡️";
}


    // --- 拼字 ---
    let spellMode = 'hard';
    function initSpelling() { currentSpellIndex = 0; loadSpellingWord(); }
    function changeSpellMode(mode) { spellMode = mode; loadSpellingWord(); saveState(); }
    function loadSpellingWord() {
    if(currentFiltered.length === 0) {
        document.getElementById('spell-display-area').innerHTML = "無單字可練習";
        return;
    }
    const input = document.getElementById('spell-input');
    input.value = "";
    input.classList.remove('correct', 'wrong');
    input.disabled = false;
    input.focus();

    document.getElementById('spell-feedback').innerText = "";
    const item = currentFiltered[currentSpellIndex];
    const displayArea = document.getElementById('spell-display-area');

    if (spellMode === 'hard') {
        displayArea.innerHTML = `<p class="hint-def">${item.d}</p>`;
    } else {
        displayArea.innerHTML = `<p class="hint-word">${item.w}</p><p class="hint-sub">${item.d}</p>`;
    }
    updateJumpMenus();
}

function checkSpelling() {
    const input = document.getElementById('spell-input');
    const ans = input.value.trim().toLowerCase();
    const correct = currentFiltered[currentSpellIndex].w.toLowerCase();

    if (ans === correct) {
        input.classList.add('correct');
        document.getElementById('spell-feedback').innerText = "✅ 正確！";
        playBeep('success');
        playSound(correct);
        input.disabled = true;

        setTimeout(() => {
            currentSpellIndex = (currentSpellIndex + 1) % currentFiltered.length;
            loadSpellingWord();
            saveState();
        }, 1200);
    } else {
        input.classList.add('wrong');
        playBeep('error');
        wrongAnswers.add(currentFiltered[currentSpellIndex]);
        setTimeout(() => input.classList.remove('wrong'), 500);
    }
}

function skipSpelling() {
    const correct = currentFiltered[currentSpellIndex].w;
    document.getElementById('spell-input').value = correct;
    playSound(correct);

    setTimeout(() => {
        currentSpellIndex = (currentSpellIndex + 1) % currentFiltered.length;
        loadSpellingWord();
        saveState();
    }, 1000);
}

function speakCurrentSpellWord() {
    playSound(currentFiltered[currentSpellIndex].w);
}

/* =========================================================
   ✅ Space = 發音
   ✅ ← / → = 上一個 / 下一個
   （只在 learning / flashcard / spelling 生效）
   並且徹底避免「空白鍵觸發上一個點過的按鈕」
========================================================= */
(function setupHotkeysFinal() {

    function getMode() {
        return document.querySelector('.tab-btn.active')?.id || '';
        // tab-learning / tab-flashcard / tab-spelling ...
    }

    function isSpace(e){ return e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar'; }
    function isLeft(e){ return e.code === 'ArrowLeft' || e.key === 'ArrowLeft'; }
    function isRight(e){ return e.code === 'ArrowRight' || e.key === 'ArrowRight'; }

    function block(e){
        e.preventDefault();
        e.stopPropagation();
        if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
    }

    // 讓任何按鈕「不留 focus」，根治 space 會重按上一個按鈕
    document.addEventListener('pointerdown', (e) => {
        const btn = e.target.closest?.('button, a');
        if (btn) btn.blur();
    }, true);

    // 只要你切換模式，也把 focus 清掉
    document.addEventListener('click', (e) => {
        const tab = e.target.closest?.('.tab-btn');
        if (tab) tab.blur();
    }, true);

    // ✅ 用 capture 攔截（keydown + keyup 都攔），避免瀏覽器把 Space 變 click
function handler(e){
    const mode = document.querySelector('.tab-btn.active')?.id || '';
    const inLearning = mode === 'tab-learning';
    const inFlash = mode === 'tab-flashcard';
    const inSpell = mode === 'tab-spelling';

    if (!(inLearning || inFlash || inSpell)) return;

    /* ===============================
       ✅ M 鍵：單字卡翻卡
    =============================== */
    const isC = e.key === 'c' || e.key === 'C';
    if (isC && inLearning) {
        // 避免在輸入框時誤觸
        const el = document.activeElement;
        const typing = el && (
            el.tagName === 'INPUT' ||
            el.tagName === 'TEXTAREA' ||
            el.isContentEditable
        );
        if (!typing) {
            e.preventDefault();
            e.stopPropagation();
            if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();

            toggleLearnFlip(); // 👈 你已經有的翻卡函式
        }
        return;
    }

    /* ===== 原本的 Space / ← / → 邏輯全部留著 ===== */

    const isSpace = e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
    const isLeft = e.code === 'ArrowLeft' || e.key === 'ArrowLeft';
    const isRight = e.code === 'ArrowRight' || e.key === 'ArrowRight';

    if (!(isSpace || isLeft || isRight)) return;

    // 清焦點，避免 Space 觸發按鈕
    if (document.activeElement && 
       (document.activeElement.tagName === 'BUTTON' || document.activeElement.tagName === 'A')) {
        document.activeElement.blur();
    }
    document.body?.focus({preventScroll:true});

    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();

    // Space：發音
    if (isSpace) {
        if (inLearning || inFlash) speakCurrentCard();
        else speakCurrentSpellWord();
        return;
    }

    // ← →
    if (inLearning || inFlash) {
        if (isLeft) prevCard();
        if (isRight) nextCard();
        return;
    }

    if (inSpell) {
        if (!currentFiltered || currentFiltered.length === 0) return;
        if (isLeft) {
            currentSpellIndex = (currentSpellIndex - 1 + currentFiltered.length) % currentFiltered.length;
            loadSpellingWord();
            saveState();
        }
        if (isRight) {
            currentSpellIndex = (currentSpellIndex + 1) % currentFiltered.length;
            loadSpellingWord();
            saveState();
        }
    }
}


// ✅ keydown：真正執行動作（避免左右鍵跳兩次）
window.addEventListener('keydown', handler, true);

// ✅ keyup：只阻止瀏覽器預設（不執行 prev/next/speak）
window.addEventListener('keyup', (e) => {
    const mode = document.querySelector('.tab-btn.active')?.id || '';
    const inLearning = mode === 'tab-learning';
    const inFlash = mode === 'tab-flashcard';
    const inSpell = mode === 'tab-spelling';
    if (!(inLearning || inFlash || inSpell)) return;

    const isSpace = e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
    const isLeft = e.code === 'ArrowLeft' || e.key === 'ArrowLeft';
    const isRight = e.code === 'ArrowRight' || e.key === 'ArrowRight';
    if (!(isSpace || isLeft || isRight)) return;

    // 管理模式/批次輸入等不要擋（避免影響打字）
    const el = document.activeElement;
    const typing = el && (el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable);
    const inputTyping = el && el.tagName === 'INPUT' && el.id !== 'spell-input';
    if (typing || inputTyping) return;

    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
}, true);


})();
